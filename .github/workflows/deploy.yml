# .github/workflows/deploy.yml
# Deploys the portfolio to GitHub Pages on every push to main.
# Injects the Gemini API key from GitHub Secrets before uploading
# so the key never appears in the source code.

name: Deploy Portfolio

on:
  push:
    branches: ["main"]
  workflow_dispatch:  # lets you trigger it manually too

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # Step 1: Download the repo code onto the runner machine
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Configure GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Step 3: Replace the placeholder in index.html with the real Gemini key
      # The key comes from GitHub Secrets — never from the source code
      - name: Inject Gemini API key
        run: |
          sed -i "s/PASTE_GEMINI_TIPS_KEY_HERE/${{ secrets.GEMINI_TIPS_KEY }}/g" index.html
          
      # Step 4: Upload the whole repo root as the Pages artifact
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      # Step 5: Deploy the uploaded artifact to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4