# .github/workflows/deploy.yml
# Deploys the portfolio to GitHub Pages on every push to main.
# Injects API keys from GitHub Secrets before uploading
# so keys never appear in the source code.

name: Deploy Portfolio

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # Step 1: Download the repo code onto the runner machine
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Configure GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Step 3: Inject secrets into index.html before deployment
      # Both keys are replaced from GitHub Secrets — never hardcoded in source
      - name: Inject secrets
        run: |
          sed -i "s/PASTE_GEMINI_TIPS_KEY_HERE/${{ secrets.GEMINI_TIPS_KEY }}/g" index.html
          sed -i "s/PASTE_GITHUB_PAT_HERE/${{ secrets.GH_PAT }}/g" index.html

      # Step 4: Upload the whole repo root as the Pages artifact
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      # Step 5: Deploy the uploaded artifact to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4